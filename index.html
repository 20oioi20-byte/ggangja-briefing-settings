<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>깡자동 브리핑 설정</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;padding:1.5rem}
h1{font-size:18px;font-weight:500;margin-bottom:4px}
.sub{font-size:13px;color:#666;margin-bottom:1.5rem}
.api-bar{background:#f0f0f0;border:0.5px solid #ddd;border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:1.5rem}
.api-bar input{flex:1;border:none;background:transparent;font-size:13px;color:#1a1a1a;outline:none}
.status-dot{width:8px;height:8px;border-radius:50%;background:#888;flex-shrink:0}
.status-dot.ok{background:#1D9E75}
.status-dot.err{background:#E24B4A}
.connected-bar{background:#f0f0f0;border:0.5px solid #ddd;border-radius:8px;padding:10px 16px;display:none;align-items:center;gap:10px;margin-bottom:1.5rem}
.tabs{display:flex;gap:4px;margin-bottom:1.5rem;border-bottom:0.5px solid #ddd}
.tab{padding:8px 16px;font-size:14px;color:#666;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px}
.tab.active{color:#1a1a1a;font-weight:500;border-bottom:2px solid #1a1a1a}
.section{display:none}
.section.active{display:block}
.card{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px}
.row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid #eee}
.row:last-child{border-bottom:none;padding-bottom:0}
.row-label{flex:1;font-size:14px}
.row-sub{font-size:12px;color:#888;margin-top:2px}
.badge{font-size:11px;padding:3px 8px;border-radius:6px}
.badge.news{background:#e8f4fd;color:#1a6fa8}
.badge.youtube{background:#fdecea;color:#b71c1c}
.badge.price{background:#e8f5e9;color:#1b5e20}
.toggle{width:36px;height:20px;border-radius:10px;background:#ccc;cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0}
.toggle.on{background:#1D9E75}
.toggle::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left 0.2s}
.toggle.on::after{left:19px}
.btn-icon{background:transparent;border:none;cursor:pointer;color:#888;padding:4px;border-radius:4px;font-size:15px}
.btn-icon:hover{color:#1a1a1a;background:#f0f0f0}
.add-row{display:flex;gap:8px;margin-top:12px}
.add-row input,.add-row select{flex:1;font-size:13px;padding:6px 10px;border:0.5px solid #ccc;border-radius:8px;background:#fff;outline:none}
.add-row button{padding:6px 14px;font-size:13px;border:0.5px solid #ccc;border-radius:8px;background:#f0f0f0;cursor:pointer}
.save-btn{width:100%;padding:10px;font-size:14px;font-weight:500;border:none;border-radius:8px;background:#1a1a1a;color:#fff;cursor:pointer;margin-top:12px}
.save-btn:hover{opacity:0.85}
.time-row{display:flex;align-items:center;gap:12px;padding:12px 0}
.time-row label{font-size:14px;color:#666;width:80px}
.time-row select{font-size:14px;padding:6px 10px;border:0.5px solid #ccc;border-radius:8px}
.day-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.chip{padding:5px 12px;font-size:12px;border:0.5px solid #ccc;border-radius:20px;cursor:pointer;color:#666;background:#fff}
.chip.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.pause-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:0.5px solid #eee;margin-top:8px}
.briefing-item{padding:12px 0;border-bottom:0.5px solid #eee;cursor:pointer}
.briefing-item:last-child{border-bottom:none}
.bi-date{font-size:12px;color:#888}
.bi-preview{font-size:13px;margin-top:4px;line-height:1.5}
.briefing-item:hover .bi-preview{color:#1a6fa8}
.send-btn{padding:10px 20px;font-size:14px;font-weight:500;border:0.5px solid #ccc;border-radius:8px;background:#f0f0f0;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:13px}
.reset-link{font-size:12px;color:#aaa;cursor:pointer;text-decoration:underline}
</style>
</head>
<body>
<h1>⚙️ 깡자동 브리핑 설정</h1>
<p class="sub">관심사, 수신자, 발송 시간을 관리합니다</p>

<div id="api-input-bar" class="api-bar">
  <span class="status-dot" id="dot"></span>
  <input type="password" id="apiKey" placeholder="Supabase Publishable Key 입력 후 Enter" />
  <button class="btn-icon" onclick="connectSupabase()">연결</button>
</div>

<div id="connected-bar" class="connected-bar">
  <span class="status-dot ok"></span>
  <span style="font-size:13px;color:#666;flex:1">Supabase 연결됨 (자동 저장)</span>
  <span class="reset-link" onclick="resetKey()">키 초기화</span>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('interests',this)">관심사</div>
  <div class="tab" onclick="switchTab('emails',this)">수신자</div>
  <div class="tab" onclick="switchTab('schedule',this)">발송 설정</div>
  <div class="tab" onclick="switchTab('history',this)">히스토리</div>
</div>

<div id="sec-interests" class="section active">
  <div class="card" id="interests-list"><div class="empty">Supabase에 연결하면 관심사 목록이 표시됩니다</div></div>
  <div class="add-row">
    <select id="new-type"><option value="news">뉴스</option><option value="youtube">유튜브</option><option value="price">시세</option></select>
    <input type="text" id="new-label" placeholder="이름 (예: AI 업계 동향)" />
    <input type="text" id="new-target" placeholder="키워드 or 채널ID" />
    <button onclick="addInterest()">+ 추가</button>
  </div>
</div>

<div id="sec-emails" class="section">
  <div class="card" id="emails-list"><div class="empty">Supabase에 연결하면 수신자 목록이 표시됩니다</div></div>
  <div class="add-row">
    <input type="email" id="new-email" placeholder="이메일 주소 입력" />
    <button onclick="addEmail()">+ 추가</button>
  </div>
</div>

<div id="sec-schedule" class="section">
  <div class="card">
    <div class="time-row">
      <label>발송 시간</label>
      <select id="hour-select">
        <option value="6">오전 6시</option><option value="7">오전 7시</option><option value="8">오전 8시</option>
        <option value="9" selected>오전 9시</option><option value="10">오전 10시</option>
        <option value="11">오전 11시</option><option value="12">오후 12시</option>
      </select>
    </div>
    <div>
      <p style="font-size:13px;color:#666">발송 요일</p>
      <div class="day-chips" id="day-chips">
        <div class="chip on" data-d="1">월</div><div class="chip on" data-d="2">화</div>
        <div class="chip on" data-d="3">수</div><div class="chip on" data-d="4">목</div>
        <div class="chip on" data-d="5">금</div><div class="chip" data-d="6">토</div>
        <div class="chip" data-d="0">일</div>
      </div>
    </div>
    <div class="pause-bar">
      <div>
        <p style="font-size:14px">발송 일시정지</p>
        <p style="font-size:12px;color:#888;margin-top:2px">켜면 자동 브리핑이 중단됩니다</p>
      </div>
      <div class="toggle" id="pause-toggle" onclick="togglePause()"></div>
    </div>
    <button class="save-btn" onclick="saveSchedule()">스케줄 저장</button>
  </div>
  <div class="card">
    <p style="font-size:13px;color:#666;margin-bottom:12px">지금 바로 브리핑 생성 및 발송</p>
    <button class="send-btn" onclick="sendNow()">▶ 즉시 발송</button>
  </div>
</div>

<div id="sec-history" class="section">
  <div class="card" id="history-list"><div class="empty">Supabase에 연결하면 히스토리가 표시됩니다</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://zbiwyqwjehnogxkzlhxx.supabase.co';
const LS_KEY='ktis_briefing_sb_key';
let sbKey='',interests=[],emails=[],paused=false,selectedDays=[1,2,3,4,5];

function showToast(msg,dur=2000){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}

async function sbFetch(path,opts={}){
  return fetch(SUPABASE_URL+path,{...opts,headers:{'apikey':sbKey,'Authorization':'Bearer '+sbKey,'Content-Type':'application/json',...(opts.headers||{})}});
}

async function connectSupabase(){
  sbKey=document.getElementById('apiKey').value.trim();
  if(!sbKey)return;
  try{
    const r=await sbFetch('/rest/v1/settings?select=key&limit=1');
    if(r.ok){localStorage.setItem(LS_KEY,sbKey);showConnected();loadAll();}
    else{document.getElementById('dot').className='status-dot err';showToast('연결 실패 — 키를 확인하세요');}
  }catch(e){document.getElementById('dot').className='status-dot err';showToast('연결 오류');}
}

function showConnected(){
  document.getElementById('api-input-bar').style.display='none';
  document.getElementById('connected-bar').style.display='flex';
}

function resetKey(){
  localStorage.removeItem(LS_KEY);sbKey='';
  document.getElementById('connected-bar').style.display='none';
  document.getElementById('api-input-bar').style.display='flex';
  document.getElementById('apiKey').value='';
  showToast('키 초기화됨. 다시 입력하세요.');
}

async function init(){
  const saved=localStorage.getItem(LS_KEY);
  if(saved){sbKey=saved;try{const r=await sbFetch('/rest/v1/settings?select=key&limit=1');if(r.ok){showConnected();loadAll();return;}}catch(e){}localStorage.removeItem(LS_KEY);}
}

document.getElementById('apiKey').addEventListener('keydown',e=>{if(e.key==='Enter')connectSupabase();});

async function loadAll(){await Promise.all([loadInterests(),loadEmails(),loadSchedule(),loadHistory()]);}

async function loadInterests(){const r=await sbFetch('/rest/v1/briefing_interests?select=*&order=sort_order');if(!r.ok)return;interests=await r.json();renderInterests();}

function renderInterests(){
  const el=document.getElementById('interests-list');
  if(!interests.length){el.innerHTML='<div class="empty">관심사가 없습니다. 아래에서 추가하세요.</div>';return;}
  el.innerHTML=interests.map(i=>`<div class="row"><div class="row-label"><span class="badge ${i.type}">${i.type==='news'?'뉴스':i.type==='youtube'?'유튜브':'시세'}</span><span style="margin-left:8px">${i.label}</span><div class="row-sub">${i.target}</div></div><div class="toggle ${i.is_active?'on':''}" onclick="toggleInterest(${i.id},${i.is_active})"></div><button class="btn-icon" onclick="deleteInterest(${i.id})">🗑</button></div>`).join('');
}

async function toggleInterest(id,cur){await sbFetch(`/rest/v1/briefing_interests?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({is_active:!cur})});await loadInterests();}
async function deleteInterest(id){await sbFetch(`/rest/v1/briefing_interests?id=eq.${id}`,{method:'DELETE'});await loadInterests();showToast('삭제됨');}

async function addInterest(){
  const type=document.getElementById('new-type').value;
  const label=document.getElementById('new-label').value.trim();
  const target=document.getElementById('new-target').value.trim();
  if(!label||!target){showToast('이름과 키워드를 입력하세요');return;}
  const maxOrder=interests.length?Math.max(...interests.map(i=>i.sort_order||0))+1:1;
  await sbFetch('/rest/v1/briefing_interests',{method:'POST',body:JSON.stringify({type,label,target,extra:{},is_active:true,sort_order:maxOrder})});
  document.getElementById('new-label').value='';document.getElementById('new-target').value='';
  await loadInterests();showToast('관심사 추가됨');
}

async function loadEmails(){const r=await sbFetch('/rest/v1/settings?key=eq.briefing_emails&select=value');if(!r.ok)return;const d=await r.json();emails=d[0]?.value||[];renderEmails();}

function renderEmails(){
  const el=document.getElementById('emails-list');
  if(!emails.length){el.innerHTML='<div class="empty">수신자가 없습니다.</div>';return;}
  el.innerHTML=emails.map((e,i)=>`<div class="row"><div class="row-label">✉ ${e}</div><button class="btn-icon" onclick="deleteEmail(${i})">🗑</button></div>`).join('');
}

async function saveEmails(){await sbFetch('/rest/v1/settings?key=eq.briefing_emails',{method:'PATCH',body:JSON.stringify({value:emails})});}

async function addEmail(){
  const val=document.getElementById('new-email').value.trim();
  if(!val||!val.includes('@')){showToast('올바른 이메일을 입력하세요');return;}
  if(emails.includes(val)){showToast('이미 등록된 이메일입니다');return;}
  emails.push(val);await saveEmails();document.getElementById('new-email').value='';renderEmails();showToast('수신자 추가됨');
}

async function deleteEmail(idx){emails.splice(idx,1);await saveEmails();renderEmails();showToast('삭제됨');}

async function loadSchedule(){
  const r=await sbFetch('/rest/v1/settings?key=in.(briefing_hour,briefing_days,briefing_paused)&select=key,value');
  if(!r.ok)return;const d=await r.json();
  d.forEach(row=>{
    if(row.key==='briefing_hour')document.getElementById('hour-select').value=row.value;
    if(row.key==='briefing_days')selectedDays=row.value;
    if(row.key==='briefing_paused')paused=row.value===true||row.value==='true';
  });
  renderDays();renderPause();
}

function renderDays(){document.querySelectorAll('#day-chips .chip').forEach(c=>{c.className='chip'+(selectedDays.includes(parseInt(c.dataset.d))?' on':'');});}
function renderPause(){document.getElementById('pause-toggle').className='toggle'+(paused?' on':'');}

document.getElementById('day-chips').addEventListener('click',e=>{
  const chip=e.target.closest('.chip');if(!chip)return;
  const d=parseInt(chip.dataset.d);
  selectedDays=selectedDays.includes(d)?selectedDays.filter(x=>x!==d):[...selectedDays,d];
  renderDays();
});

function togglePause(){paused=!paused;renderPause();}

async function upsertSetting(key,value){
  const check=await sbFetch(`/rest/v1/settings?key=eq.${key}&select=key`);
  const d=await check.json();
  if(d.length)await sbFetch(`/rest/v1/settings?key=eq.${key}`,{method:'PATCH',body:JSON.stringify({value})});
  else await sbFetch('/rest/v1/settings',{method:'POST',body:JSON.stringify({key,value})});
}

async function saveSchedule(){
  const h=document.getElementById('hour-select').value;
  await Promise.all([upsertSetting('briefing_hour',h),upsertSetting('briefing_days',selectedDays),upsertSetting('briefing_paused',paused)]);
  showToast('스케줄 저장 완료');
}

async function sendNow(){
  if(!sbKey){showToast('먼저 Supabase에 연결하세요');return;}
  showToast('브리핑 발송 중...',5000);
  try{
    const r=await fetch(`${SUPABASE_URL}/functions/v1/daily-briefing?force=true`,{method:'POST',headers:{'Authorization':'Bearer '+sbKey,'Content-Type':'application/json'},body:'{}'});
    const d=await r.json();
    if(d.success)showToast(`발송 완료 — 뉴스 ${d.newsCount}건`);else showToast('발송 실패');
  }catch(e){showToast('오류: '+e.message);}
}

async function loadHistory(){
  const r=await sbFetch('/rest/v1/briefings?select=id,content,created_at&order=created_at.desc&limit=10');
  if(!r.ok)return;const data=await r.json();
  const el=document.getElementById('history-list');
  if(!data.length){el.innerHTML='<div class="empty">아직 브리핑 기록이 없습니다</div>';return;}
  el.innerHTML=data.map(b=>{
    const date=new Date(b.created_at).toLocaleString('ko-KR');
    const preview=b.content.replace(/[#*>\-]/g,'').slice(0,80)+'...';
    return `<div class="briefing-item"><div class="bi-date">${date}</div><div class="bi-preview">${preview}</div></div>`;
  }).join('');
}

function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');document.getElementById('sec-'+name).classList.add('active');
}

init();
</script>
</body>
</html>
